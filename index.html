<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="今天吃什么">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ff9fbd">
  <title>今天吃什么</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arial Rounded MT Bold", "Microsoft YaHei", Arial, sans-serif;
      color: #5a4250;
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 255, 255, 0.92) 0 7px, transparent 8px),
        radial-gradient(circle at 86% 14%, rgba(255, 255, 255, 0.75) 0 9px, transparent 10px),
        radial-gradient(circle at 78% 78%, rgba(255, 246, 171, 0.65) 0 14px, transparent 15px),
        linear-gradient(135deg, #ffe7f1 0%, #fff7d6 43%, #dff8ef 100%);
      -webkit-text-size-adjust: 100%;
    }

    .container {
      width: min(92%, 720px);
      margin: 34px auto;
      padding: 24px;
      background: rgba(255, 255, 255, 0.82);
      border: 3px solid #ffd1df;
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(242, 137, 169, 0.22);
    }

    h1 {
      margin: 0 0 10px;
      padding: 14px 18px;
      color: #ffffff;
      text-align: center;
      font-size: 36px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ff8fb3, #ffaecb);
      border: 3px solid #ffffff;
      border-radius: 999px;
      box-shadow: 0 8px 0 #ffc3d7;
    }

    .subtitle {
      margin: 18px 0 22px;
      text-align: center;
      color: #8c6878;
      font-size: 15px;
    }

    .error-box {
      display: none;
      margin: 0 0 16px;
      padding: 12px 14px;
      color: #8f1d36;
      font-weight: bold;
      line-height: 1.5;
      background: #ffe0e8;
      border: 2px solid #ff8fab;
      border-radius: 16px;
    }

    .selector-card,
    .result-box,
    .history-box {
      margin-top: 18px;
      padding: 18px;
      background: #fffafc;
      border: 2px solid #ffd5e3;
      border-radius: 22px;
      box-shadow: 0 10px 22px rgba(242, 137, 169, 0.12);
    }

    .group-title {
      margin: 0 0 12px;
      color: #ff6f9f;
      font-size: 19px;
      font-weight: bold;
    }

    .choice-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .choice-button {
      flex: 1 1 132px;
      min-height: 46px;
      padding: 10px 12px;
      color: #6b5060;
      font-size: 15px;
      font-weight: bold;
      background: #fff2c9;
      border: 2px solid #ffd78a;
      border-radius: 999px;
      box-shadow: 0 5px 0 #f1c866;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-button:hover,
    .choice-button.selected {
      color: #ffffff;
      background: #ff8fb3;
      border-color: #ff75a4;
      box-shadow: 0 5px 0 #e85f92;
      transform: translateY(-2px);
    }

    .choice-button:active {
      box-shadow: 0 2px 0 #e85f92;
      transform: translateY(3px) scale(0.98);
    }

    .main-actions,
    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      flex: 1;
      min-height: 48px;
      padding: 12px 14px;
      color: #ffffff;
      font-size: 17px;
      font-weight: bold;
      background: #7bcfb8;
      border: 0;
      border-radius: 18px;
      box-shadow: 0 6px 0 #4fb095;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      box-shadow: 0 2px 0 #4fb095;
      transform: translateY(4px) scale(0.98);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .primary-button {
      background: #ff8fb3;
      box-shadow: 0 6px 0 #e85f92;
    }

    .primary-button:active {
      box-shadow: 0 2px 0 #e85f92;
    }

    .confirm-button {
      background: #75d49b;
      box-shadow: 0 6px 0 #4bbd78;
    }

    .confirm-button:active {
      box-shadow: 0 2px 0 #4bbd78;
    }

    .again-button {
      color: #6b5060;
      background: #ffe07d;
      box-shadow: 0 6px 0 #eac049;
    }

    .again-button:active {
      box-shadow: 0 2px 0 #eac049;
    }

    .clear-history {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 8px 12px;
      color: #8b5a70;
      font-size: 14px;
      background: #ffe0ec;
      box-shadow: 0 4px 0 #f4adc7;
    }

    .clear-history:active {
      box-shadow: 0 1px 0 #f4adc7;
    }

    .result-box {
      display: none;
      text-align: center;
    }

    .result-box.show {
      display: block;
    }

    .result-label {
      margin: 0 0 8px;
      color: #8c6878;
      font-size: 16px;
    }

    #resultText {
      display: block;
      color: #ff5f98;
      font-size: clamp(36px, 9vw, 56px);
      line-height: 1.15;
      word-break: keep-all;
    }

    #reasonText {
      margin: 12px auto 0;
      max-width: 520px;
      color: #6d5b63;
      font-size: 16px;
      line-height: 1.65;
    }

    .egg-alert {
      display: none;
      margin: 16px 0 0;
      padding: 14px 16px;
      color: #ffffff;
      font-size: 22px;
      font-weight: bold;
      background: #ff3b5f;
      border: 3px solid #9e122c;
      border-radius: 18px;
      box-shadow: 0 8px 0 #b51d37;
      animation: angryShake 0.35s ease-in-out 0s 4;
    }

    .egg-alert.show {
      display: block;
    }

    @keyframes angryShake {
      0% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-6px) rotate(-2deg); }
      50% { transform: translateX(6px) rotate(2deg); }
      75% { transform: translateX(-4px) rotate(-1deg); }
      100% { transform: translateX(0) rotate(0deg); }
    }

    .history-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .history-title h2 {
      margin: 0;
      color: #ff6f9f;
      font-size: 21px;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: #fff4d8;
      border: 2px solid #ffe2a3;
      border-radius: 16px;
    }

    .history-time {
      color: #9a7786;
      white-space: nowrap;
    }

    .history-result {
      color: #4da98f;
      font-weight: bold;
      text-align: right;
    }

    .empty-history {
      margin: 0;
      color: #9a7786;
    }

    .celebration {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(70, 45, 58, 0.56);
      z-index: 10;
      overflow: hidden;
    }

    .celebration.show {
      display: flex;
    }

    #fireworksCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .celebration-text {
      position: relative;
      max-width: 92vw;
      padding: 0 18px;
      color: #ffffff;
      font-size: 76px;
      font-size: clamp(54px, 12vw, 112px);
      font-weight: bold;
      line-height: 1.15;
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.95), 0 0 24px rgba(255, 184, 213, 1), 0 0 46px rgba(255, 101, 153, 0.9);
      animation: popIn 0.55s ease-out forwards, winnerPulse 1.1s ease-in-out 0.55s infinite;
      word-break: keep-all;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.45); }
      70% { opacity: 1; transform: scale(1.14); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes winnerPulse {
      0% { transform: scale(1) rotate(-1deg); }
      50% { transform: scale(1.08) rotate(1deg); }
      100% { transform: scale(1) rotate(-1deg); }
    }

    @media (max-width: 560px) {
      body {
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      .container {
        width: auto;
        margin: 14px 10px 24px;
        padding: 16px;
        border-radius: 24px;
      }

      h1 {
        font-size: 30px;
      }

      .selector-card,
      .result-box,
      .history-box {
        padding: 15px;
        border-radius: 20px;
      }

      .choice-button {
        flex-basis: 42%;
        min-height: 44px;
        font-size: 14px;
      }

      .main-actions,
      .result-actions {
        flex-direction: column;
      }

      button {
        min-height: 50px;
        font-size: 17px;
      }

      .history-title {
        align-items: stretch;
      }

      .history-item {
        display: block;
      }

      .history-time {
        display: block;
        margin-bottom: 4px;
        white-space: normal;
        font-size: 13px;
      }

      .history-result {
        display: block;
        text-align: left;
        font-size: 17px;
      }

      .celebration-text {
        font-size: 54px;
        font-size: clamp(48px, 17vw, 84px);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>今天吃什么</h1>
    <p class="subtitle">选一下今天的状态，让小饭搭子帮你推荐一口。</p>

    <div id="errorBox" class="error-box">
      页面刚才有一点小问题，但主要功能还可以继续用。请刷新页面再试一次。
    </div>

    <div id="selectorArea"></div>

    <div class="main-actions">
      <button id="recommendButton" class="primary-button" disabled>开始推荐</button>
    </div>

    <section id="resultBox" class="result-box">
      <p class="result-label">今天吃这个</p>
      <strong id="resultText">等待推荐</strong>
      <p id="reasonText">先选完三个条件，再开始推荐。</p>
      <div id="eggAlert" class="egg-alert">😤 还不满意？吃屎吧！</div>
      <div class="result-actions">
        <button id="confirmButton" class="confirm-button">确认</button>
        <button id="againButton" class="again-button">换一个</button>
      </div>
    </section>

    <section class="history-box">
      <div class="history-title">
        <h2>吃过什么</h2>
        <button id="clearHistoryButton" class="clear-history" type="button">清空历史</button>
      </div>
      <ul id="historyList" class="history-list"></ul>
      <p id="emptyHistory" class="empty-history">还没有记录，点“确认”后会自动记录。</p>
    </section>
  </main>

  <div id="celebration" class="celebration">
    <canvas id="fireworksCanvas"></canvas>
    <div id="celebrationText" class="celebration-text"></div>
  </div>

  <script>
    // 推荐配置表：以后主要改这里就行。
    const RECOMMEND_CONFIG = {
      groups: [
        {
          key: "mood",
          title: "心情",
          options: ["心情美丽", "没什么特别", "有点忧伤", "非常沮丧"]
        },
        {
          key: "hunger",
          title: "饥饿程度",
          options: ["不怎么饿", "一般", "有点饿", "饿死了"]
        },
        {
          key: "other",
          title: "其他",
          options: ["减脂期", "长肉期", "放纵期", "肚子痛"]
        }
      ],

      foodPools: {
        "心情美丽": ["超级碗", "食其家", "海南椰子鸡", "鲜虾云吞", "吃点水果算了"],
        "没什么特别": ["牛羊肉米粉", "面", "饺子", "中餐", "食其家"],
        "有点忧伤": ["鲜虾云吞", "面", "饺子", "海南椰子鸡", "牛羊肉米粉"],
        "非常沮丧": ["麦当劳", "猪脚饭", "食其家", "中餐两菜", "海南椰子鸡"],

        "不怎么饿": ["不吃了", "吃点水果算了", "鲜虾云吞", "面", "超级碗"],
        "一般": ["牛羊肉米粉", "面", "鲜虾云吞", "饺子", "中餐"],
        "有点饿": ["食其家", "牛羊肉米粉", "猪脚饭", "中餐两菜", "海南椰子鸡"],
        "饿死了": ["猪脚饭", "麦当劳", "食其家", "中餐两菜", "牛羊肉米粉"],

        "减脂期": ["超级碗", "吃点水果算了", "鲜虾云吞", "海南椰子鸡", "不吃了"],
        "长肉期": ["猪脚饭", "麦当劳", "食其家", "中餐两菜", "牛羊肉米粉"],
        "放纵期": ["麦当劳", "猪脚饭", "食其家", "中餐两菜", "海南椰子鸡"],
        "肚子痛": ["面", "鲜虾云吞", "饺子", "海南椰子鸡", "不吃了"]
      },

      reasons: {
        "心情美丽": "心情这么好，吃点开心的刚刚好～",
        "没什么特别": "普通的一天，也要好好喂饱自己呀。",
        "有点忧伤": "今天需要一点热乎乎的安慰。",
        "非常沮丧": "抱抱你，先吃点快乐回血吧！",

        "不怎么饿": "肚肚还很淡定，轻轻吃一点就好。",
        "一般": "刚好有点空位，安排一顿舒服的。",
        "有点饿": "能量告急，快补充一点好吃的！",
        "饿死了": "饿到冒烟啦，必须吃饱饱！",

        "减脂期": "清爽一点，身体会夸你乖。",
        "长肉期": "多吃一点，努力长成结实小朋友。",
        "放纵期": "今天不讲道理，快乐最大！",
        "肚子痛": "肚肚不舒服，先选温柔一点的。"
      },

      defaultReason: "这个选择很适合今天的你，放心吃一口吧～"
    };

    (function () {
      function startApp() {
        try {
          var selectorArea = document.getElementById("selectorArea");
          var recommendButton = document.getElementById("recommendButton");
          var resultBox = document.getElementById("resultBox");
          var resultText = document.getElementById("resultText");
          var reasonText = document.getElementById("reasonText");
          var confirmButton = document.getElementById("confirmButton");
          var againButton = document.getElementById("againButton");
          var eggAlert = document.getElementById("eggAlert");
          var historyList = document.getElementById("historyList");
          var emptyHistory = document.getElementById("emptyHistory");
          var clearHistoryButton = document.getElementById("clearHistoryButton");
          var celebration = document.getElementById("celebration");
          var celebrationText = document.getElementById("celebrationText");
          var fireworksCanvas = document.getElementById("fireworksCanvas");
          var errorBox = document.getElementById("errorBox");

          if (!selectorArea || !recommendButton || !resultText) {
            showError("页面没有加载完整，请刷新后再试。");
            return;
          }

          var selected = {};
          var currentFood = "";
          var currentReason = "";
          var currentRoundFoods = [];
          var changeCount = 0;
          var eggTriggered = false;
          var drawHistory = loadHistory();

          var userAgent = navigator.userAgent || "";
          var isWechat = userAgent.toLowerCase().indexOf("micromessenger") !== -1;
          var isMobile = /iphone|ipad|ipod|android/i.test(userAgent);
          var fireworksContext = null;
          var canUseFireworks = !isWechat && !isMobile && fireworksCanvas && fireworksCanvas.getContext;
          var fireworksTimer = null;
          var celebrationTimeout = null;
          var animationFrame = null;
          var particles = [];

          if (canUseFireworks) {
            try {
              fireworksContext = fireworksCanvas.getContext("2d");
              canUseFireworks = !!fireworksContext;
            } catch (error) {
              canUseFireworks = false;
            }
          }

          function showError(message) {
            if (errorBox) {
              errorBox.textContent = message || "页面遇到一点问题，请刷新后再试。";
              errorBox.style.display = "block";
            }
          }

          function safeGetStorage(key) {
            try {
              return window.localStorage.getItem(key);
            } catch (error) {
              return null;
            }
          }

          function safeSetStorage(key, value) {
            try {
              window.localStorage.setItem(key, value);
            } catch (error) {
              showError("历史记录暂时保存不了，但推荐功能可以继续用。");
            }
          }

          function safeRemoveStorage(key) {
            try {
              window.localStorage.removeItem(key);
            } catch (error) {
              showError("历史记录暂时清不掉，可以刷新后再试。");
            }
          }

          function loadHistory() {
            var savedHistory = safeGetStorage("foodDrawHistory");

            if (!savedHistory) {
              return [];
            }

            try {
              var parsedHistory = JSON.parse(savedHistory);

              if (Object.prototype.toString.call(parsedHistory) === "[object Array]") {
                return parsedHistory;
              }
            } catch (error) {
              safeRemoveStorage("foodDrawHistory");
              showError("旧的历史记录格式异常，已自动重置。");
            }

            return [];
          }

          function saveHistory() {
            safeSetStorage("foodDrawHistory", JSON.stringify(drawHistory));
          }

          function createSelectorGroups() {
            selectorArea.innerHTML = "";

            RECOMMEND_CONFIG.groups.forEach(function (group) {
              var card = document.createElement("section");
              var title = document.createElement("p");
              var choices = document.createElement("div");

              card.className = "selector-card";
              title.className = "group-title";
              choices.className = "choice-group";

              title.textContent = group.title;
              card.appendChild(title);
              card.appendChild(choices);
              selectorArea.appendChild(card);

              createChoiceButtons(group.options, group.key, choices);
            });
          }

          function createChoiceButtons(items, groupName, container) {
            container.innerHTML = "";

            items.forEach(function (item) {
              var button = document.createElement("button");
              button.type = "button";
              button.className = "choice-button";
              button.textContent = item;
              button.addEventListener("click", function () {
                selected[groupName] = item;
                markSelected(container, button);
                updateRecommendButton();
              });
              container.appendChild(button);
            });
          }

          function markSelected(container, activeButton) {
            var buttons = container.querySelectorAll(".choice-button");

            buttons.forEach(function (button) {
              button.classList.remove("selected");
            });

            activeButton.classList.add("selected");
          }

          function updateRecommendButton() {
            recommendButton.disabled = !RECOMMEND_CONFIG.groups.every(function (group) {
              return !!selected[group.key];
            });
          }

          function uniqueList(list) {
            var result = [];

            list.forEach(function (item) {
              if (result.indexOf(item) === -1) {
                result.push(item);
              }
            });

            return result;
          }

          function intersectLists(lists) {
            if (lists.length === 0) {
              return [];
            }

            return lists[0].filter(function (item) {
              return lists.every(function (list) {
                return list.indexOf(item) !== -1;
              });
            });
          }

          function pickFood(excludeCurrentRound) {
            var pools = RECOMMEND_CONFIG.groups.map(function (group) {
              return RECOMMEND_CONFIG.foodPools[selected[group.key]] || [];
            }).filter(function (pool) {
              return pool.length > 0;
            });
            var intersection = uniqueList(intersectLists(pools));
            var merged = uniqueList([].concat.apply([], pools));
            var candidates = intersection.length > 0 ? intersection : merged;

            candidates = avoidRecentFoods(candidates);

            if (excludeCurrentRound && currentRoundFoods.length > 0) {
              var freshCandidates = candidates.filter(function (food) {
                return currentRoundFoods.indexOf(food) === -1;
              });

              if (freshCandidates.length > 0) {
                candidates = freshCandidates;
              } else if (candidates.length > 1 && currentFood) {
                candidates = candidates.filter(function (food) {
                  return food !== currentFood;
                });
              }
            }

            if (candidates.length === 0) {
              candidates = merged.length > 0 ? merged : ["今天先喝点热水"];
            }

            return candidates[Math.floor(Math.random() * candidates.length)];
          }

          function avoidRecentFoods(candidates) {
            var recentFoods = drawHistory.slice(0, 3).map(function (item) {
              return item.result;
            });
            var lastFood = drawHistory.length > 0 ? drawHistory[0].result : "";
            var filtered = candidates.filter(function (food) {
              return food !== lastFood;
            });

            if (filtered.length === 0) {
              filtered = candidates.slice();
            }

            var weighted = [];
            filtered.forEach(function (food) {
              var weight = recentFoods.indexOf(food) === -1 ? 4 : 1;

              for (var i = 0; i < weight; i++) {
                weighted.push(food);
              }
            });

            return weighted;
          }

          function makeReason() {
            var moodReason = RECOMMEND_CONFIG.reasons[selected.mood] || "";
            var otherReason = RECOMMEND_CONFIG.reasons[selected.other] || "";
            var combinedReason = [moodReason, otherReason].filter(function (reason) {
              return reason !== "";
            }).join(" ");

            return combinedReason || RECOMMEND_CONFIG.defaultReason;
          }

          function showRecommendation(excludeCurrentRound) {
            currentFood = pickFood(excludeCurrentRound);
            currentReason = makeReason();
            currentRoundFoods.push(currentFood);
            resultText.textContent = currentFood;
            reasonText.textContent = currentReason;
            resultBox.classList.add("show");
          }

          function startNewRound() {
            currentRoundFoods = [];
            changeCount = 0;
            eggTriggered = false;
            eggAlert.classList.remove("show");
            showRecommendation(false);
          }

          function changeRecommendation() {
            changeCount += 1;

            if (changeCount === 3 && !eggTriggered) {
              eggTriggered = true;
              eggAlert.classList.add("show");
            }

            showRecommendation(true);
          }

          function confirmRecommendation() {
            if (!currentFood) {
              return;
            }

            addHistory(currentFood);
            showCelebration(currentFood);
          }

          function padNumber(number) {
            return number < 10 ? "0" + number : String(number);
          }

          function formatDate(date) {
            return date.getFullYear() + "-" +
              padNumber(date.getMonth() + 1) + "-" +
              padNumber(date.getDate()) + " " +
              padNumber(date.getHours()) + ":" +
              padNumber(date.getMinutes());
          }

          function renderHistory() {
            historyList.innerHTML = "";

            if (drawHistory.length === 0) {
              emptyHistory.style.display = "block";
              return;
            }

            emptyHistory.style.display = "none";

            drawHistory.forEach(function (item) {
              var li = document.createElement("li");
              var time = document.createElement("span");
              var result = document.createElement("span");

              li.className = "history-item";
              time.className = "history-time";
              result.className = "history-result";
              time.textContent = item.date || "";
              result.textContent = item.result || "";

              li.appendChild(time);
              li.appendChild(result);
              historyList.appendChild(li);
            });
          }

          function addHistory(result) {
            drawHistory.unshift({
              date: formatDate(new Date()),
              result: result
            });

            drawHistory = drawHistory.slice(0, 20);
            saveHistory();
            renderHistory();
          }

          function clearHistory() {
            drawHistory = [];
            saveHistory();
            renderHistory();
          }

          function resizeCanvas() {
            if (!canUseFireworks) {
              return;
            }

            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
          }

          function createFirework() {
            if (!canUseFireworks) {
              return;
            }

            var colors = ["#ffd166", "#ff8fb3", "#91e5c6", "#a7d8ff", "#ffffff"];
            var x = Math.random() * fireworksCanvas.width;
            var y = Math.random() * fireworksCanvas.height * 0.65;

            for (var i = 0; i < 42; i++) {
              var angle = (Math.PI * 2 * i) / 42;
              var speed = 2 + Math.random() * 4;

              particles.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 60,
                color: colors[Math.floor(Math.random() * colors.length)]
              });
            }
          }

          function drawFireworks() {
            if (!canUseFireworks) {
              return;
            }

            fireworksContext.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

            particles.forEach(function (particle) {
              particle.x += particle.vx;
              particle.y += particle.vy;
              particle.vy += 0.035;
              particle.life -= 1;
              fireworksContext.globalAlpha = Math.max(particle.life / 60, 0);
              fireworksContext.fillStyle = particle.color;
              fireworksContext.beginPath();
              fireworksContext.arc(particle.x, particle.y, 3, 0, Math.PI * 2);
              fireworksContext.fill();
            });

            fireworksContext.globalAlpha = 1;
            particles = particles.filter(function (particle) {
              return particle.life > 0;
            });
            animationFrame = window.requestAnimationFrame(drawFireworks);
          }

          function stopCelebration() {
            celebration.classList.remove("show");
            clearInterval(fireworksTimer);
            clearTimeout(celebrationTimeout);

            if (animationFrame) {
              window.cancelAnimationFrame(animationFrame);
            }

            fireworksTimer = null;
            celebrationTimeout = null;
            animationFrame = null;
            particles = [];

            if (canUseFireworks) {
              fireworksContext.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
            }
          }

          function showCelebration(text) {
            stopCelebration();
            celebrationText.textContent = text;
            celebration.classList.add("show");

            if (canUseFireworks) {
              resizeCanvas();
              createFirework();
              fireworksTimer = setInterval(createFirework, 350);
              drawFireworks();
            }

            celebrationTimeout = setTimeout(stopCelebration, 2200);
          }

          createSelectorGroups();
          renderHistory();

          recommendButton.addEventListener("click", startNewRound);
          againButton.addEventListener("click", changeRecommendation);
          confirmButton.addEventListener("click", confirmRecommendation);
          clearHistoryButton.addEventListener("click", clearHistory);
          window.addEventListener("resize", resizeCanvas);
        } catch (error) {
          var fallbackErrorBox = document.getElementById("errorBox");

          if (fallbackErrorBox) {
            fallbackErrorBox.textContent = "页面启动时遇到问题，请刷新后再试。";
            fallbackErrorBox.style.display = "block";
          }
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", startApp);
      } else {
        startApp();
      }
    })();
  </script>
</body>
</html>
